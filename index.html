<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页 - 你的名字</title>

    <meta http-equiv="Cache-Control" content="no-store" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <link rel="stylesheet" href="static/header.css">
    <link rel="stylesheet" href="static/hero.css">
    <link rel="stylesheet" href="static/styles.css">
    <link rel="icon" href="favicon.ico" />
</head>

<body>
    <canvas id="starfield" class="starfield-canvas" aria-hidden="true"></canvas>

    <header id="header">
        <div style="display:flex; align-items:center; gap:12px; width:100%; max-width:1100px; justify-content:space-between;">
            <div style="font-weight:bold; font-size:18px;">你的名字 · Homepage</div>
            <div>
                <a href="focus.html" class="nav-btn">专注计时器</a>
                <a href="gallery.html" class="nav-btn">光影留痕</a>
                <a href="https://example.com" class="nav-btn" target="_blank" rel="noopener noreferrer">笔记</a>
            </div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1 class="greeting">欢迎来到你的主页</h1>
            <div class="typed-wrapper">
                <span id="typed" class="typed-text"></span>
                <span class="cursor" aria-hidden="true"></span>
            </div>
        </div>
    </section>

    <div class="content">
        <h2 style="color:white; text-align:center; margin-top:30px;">精选光影</h2>
        <div id="featuredPhotosContainer" class="featured-photos-scroll"></div>
    </div>

    <div class="content">
        <h2 style="color:white; text-align:center; margin-top:30px;">妙笔生花</h2>
        <div id="articlesContainer" class="articles-grid"></div>
    </div>

    <div class="content">
        <h2 style="color:white; text-align:center; margin-top:30px;">用心做视频</h2>
        <div id="focusVideosContainer" class="articles-grid"></div>
    </div>

    <div class="content">
        <h2 style="color:white; text-align:center; margin-top:30px;">曲苑天地</h2>
        <div class="music-board-wrap">
            <p class="music-board-desc">将 Apple Music 或其他平台的歌单嵌入在这里。</p>
            <div style="max-width:660px; margin:0 auto; overflow:hidden; border-radius:10px; border:1px solid rgba(255,255,255,0.12); background: rgba(0,0,0,0.35);">
                <iframe allow="autoplay *; encrypted-media *; fullscreen *; clipboard-write" frameborder="0" height="450" style="width:100%; overflow:hidden; filter: invert(1) hue-rotate(180deg) saturate(0.9) contrast(0.92) brightness(0.9); opacity:0.92;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation"
                    src="https://embed.music.apple.com/cn/playlist/favorite-songs/pl.u-XXXXXX" loading="lazy"></iframe>
            </div>
        </div>
    </div>

    <div class="content">
        <h2 style="color:white; text-align:center; margin-top:30px;">更新频率统计</h2>
        <div id="heatmapContainer" class="heatmap"></div>
        <div class="heat-legend">
            <span>少</span>
            <div class="legend-blocks">
                <div class="legend-cell level-0"></div>
                <div class="legend-cell level-1"></div>
                <div class="legend-cell level-2"></div>
                <div class="legend-cell level-3"></div>
                <div class="legend-cell level-4"></div>
            </div>
            <span>多</span>
        </div>
    </div>

    <div class="content">
        <h2 style="color:white; text-align:center; margin-top:30px;">更新日志</h2>
        <div id="changelog-container" class="changelog-timeline"></div>
    </div>

    <div class="content">
        <h2 style="color:white; text-align:center; margin-top:30px;">缘分天空</h2>
        <div class="articles-grid" aria-label="友链列表" id="friendsContainer"></div>
    </div>

    <script src="static/data.js"></script>
    <script>
        function getFeaturedPhotos(limit) {
            const maxCount = limit || 10;
            const featured = Array.isArray(window.FEATURED_LIGHTTRACE) ? window.FEATURED_LIGHTTRACE : [];
            if (featured.length > 0) {
                return featured.slice(0, maxCount).map(item => ({
                    data: item.src,
                    comment: item.comment || '',
                    fileName: item.id || item.src || ''
                }));
            }

            try {
                const stored = localStorage.getItem('gallery_images_v1');
                const images = stored ? JSON.parse(stored) : [];
                return images.slice(0, maxCount);
            } catch (e) {
                return [];
            }
        }

        function getFeaturedPhotoLimit() {
            const container = document.getElementById('featuredPhotosContainer');
            if (!container) return 12;
            const width = container.clientWidth || window.innerWidth || 0;
            if (!width) return 12;

            let columns = 5;
            if (width <= 400) {
                columns = 2;
            } else if (width <= 700) {
                columns = 3;
            } else if (width <= 900) {
                columns = 4;
            }

            return Math.max(12, columns * 4);
        }

        function renderFeaturedPhotos() {
            const container = document.getElementById('featuredPhotosContainer');
            const limit = getFeaturedPhotoLimit();
            const photos = getFeaturedPhotos(limit);

            if (photos.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.5); padding:40px;">暂无图片，去 <a href="gallery.html" style="color:#ffa500;">光影留痕</a> 上传</div>';
                return;
            }

            container.innerHTML = '';
            const scroll = document.createElement('div');
            scroll.className = 'photos-scroll-wrapper';

            photos.forEach(photo => {
                const item = document.createElement('div');
                item.className = 'photo-item';
                item.innerHTML = `
                    <img src="${photo.data}" alt="" title="${photo.fileName || ''}">
                    <div class="photo-comment">${photo.comment || ''}</div>
                `;
                item.addEventListener('click', () => {
                    window.location.href = 'gallery.html';
                });
                scroll.appendChild(item);
            });

            container.appendChild(scroll);
        }

        let featuredResizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(featuredResizeTimer);
            featuredResizeTimer = setTimeout(renderFeaturedPhotos, 150);
        });

        const articles = [{
            id: 1,
            title: "文章标题示例",
            description: "用一句话介绍这篇文章的核心内容。",
            image: "photos/photo1.webp",
            link: "https://example.com/your-article-1",
            comment: "学习天地"
        }, {
            id: 2,
            title: "旅行故事示例",
            description: "记录一段旅途中的美好瞬间。",
            image: "photos/photo2.png",
            link: "https://example.com/your-article-2",
            comment: "感性空间"
        }, {
            id: 3,
            title: "笔记或教程",
            description: "总结某个知识点或项目实践。",
            image: "photos/photo3.jpg",
            link: "https://example.com/your-article-3",
            comment: "学习天地"
        }];

        function getFocusVideos() {
            if (Array.isArray(window.FOCUS_VIDEO_LIBRARY)) {
                return window.FOCUS_VIDEO_LIBRARY.filter(item => item && (item.link || item.bvid));
            }
            return [];
        }

        function extractBvid(value) {
            const match = String(value || '').match(/BV[0-9A-Za-z]{10}/);
            return match ? match[0] : '';
        }

        function normalizeSecureCoverUrl(url) {
            const raw = String(url || '').trim();
            if (!raw) return '';
            if (raw.startsWith('//')) return `https:${raw}`;
            return raw.replace(/^http:\/\//i, 'https://');
        }

        function resolveBilibiliInfo(videoItem) {
            const bvid = videoItem.bvid || extractBvid(videoItem.link);
            if (!bvid) return null;

            return {
                bvid,
                openUrl: videoItem.link || `https://www.bilibili.com/video/${bvid}/`,
                embedUrl: `https://player.bilibili.com/player.html?bvid=${encodeURIComponent(bvid)}&page=1&autoplay=1&muted=1&danmaku=0`
            };
        }

        const DEFAULT_VIDEO_FALLBACK_COVER = 'photos/photo3.jpg';
        const biliCoverCache = new Map();
        const coverReachabilityCache = new Map();

        function loadBilibiliCover(bvid) {
            if (!bvid) return Promise.resolve('');
            if (biliCoverCache.has(bvid)) {
                return Promise.resolve(biliCoverCache.get(bvid));
            }

            const apiUrl = `https://api.bilibili.com/x/web-interface/view?bvid=${encodeURIComponent(bvid)}`;
            return fetch(apiUrl)
                .then(response => {
                    if (!response.ok) return null;
                    return response.json();
                })
                .then(result => {
                    const coverRaw = result && result.data && result.data.pic ? result.data.pic : '';
                    const cover = normalizeSecureCoverUrl(coverRaw);
                    biliCoverCache.set(bvid, cover);
                    return cover;
                })
                .catch(() => '');
        }

        function resolveFallbackCover(videoItem) {
            const candidates = [
                videoItem && videoItem.fallbackCover,
                videoItem && videoItem.cover,
                window.FOCUS_VIDEO_FALLBACK_COVER,
                DEFAULT_VIDEO_FALLBACK_COVER
            ];

            for (const candidate of candidates) {
                const normalized = normalizeSecureCoverUrl(candidate || '');
                if (normalized) return normalized;
            }

            return '';
        }

        function validateCoverUrl(url) {
            const target = normalizeSecureCoverUrl(url || '');
            if (!target) return Promise.resolve('');

            if (coverReachabilityCache.has(target)) {
                return Promise.resolve(coverReachabilityCache.get(target));
            }

            return new Promise(resolve => {
                const image = new Image();

                image.onload = () => {
                    coverReachabilityCache.set(target, target);
                    resolve(target);
                };

                image.onerror = () => {
                    coverReachabilityCache.set(target, '');
                    resolve('');
                };

                image.referrerPolicy = 'no-referrer';
                image.src = target;
            });
        }

        function resolveVideoCover(videoItem, biliInfo) {
            const fallbackCover = resolveFallbackCover(videoItem);

            return loadBilibiliCover(biliInfo && biliInfo.bvid)
                .then(validateCoverUrl)
                .then(crawledCover => {
                    if (crawledCover) return crawledCover;
                    return validateCoverUrl(fallbackCover);
                })
                .catch(() => validateCoverUrl(fallbackCover));
        }

        function renderFocusVideos() {
            const container = document.getElementById('focusVideosContainer');
            if (!container) return;

            const videos = getFocusVideos();
            container.innerHTML = '';

            if (videos.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.5); padding:30px; grid-column:1/-1;">暂无视频，请在 static/data.js 的 FOCUS_VIDEO_LIBRARY 中填写。</div>';
                return;
            }

            const grid = document.createElement('div');
            grid.className = 'articles-grid';

            videos.forEach(videoItem => {
                const card = document.createElement('div');
                card.className = 'article-card';
                card.style.cursor = 'pointer';
                const biliInfo = resolveBilibiliInfo(videoItem);
                if (!biliInfo) {
                    return;
                }

                card.innerHTML = `
                    <div class="article-image">
                        <div class="bili-preview-shell">
                            <div class="bili-preview-cover"></div>
                            <div class="bili-preview-placeholder"></div>
                            <div class="bili-preview-player"></div>
                            <span class="bili-badge">Bilibili</span>
                        </div>
                    </div>
                    <div class="article-content">
                        <h3>${videoItem.title || '未命名视频'}</h3>
                        <p>${videoItem.description || '专注记录'}</p>
                        <div class="article-comment">${videoItem.comment || ''}</div>
                    </div>
                `;

                const playerWrap = card.querySelector('.bili-preview-player');
                const coverWrap = card.querySelector('.bili-preview-cover');

                resolveVideoCover(videoItem, biliInfo).then(coverUrl => {
                    if (!coverWrap || !coverUrl) return;
                    coverWrap.style.backgroundImage = `url("${coverUrl}")`;
                    card.classList.add('has-cover');
                });

                card.addEventListener('mouseenter', () => {
                    if (!playerWrap) return;
                    if (!playerWrap.querySelector('iframe')) {
                        const iframe = document.createElement('iframe');
                        iframe.src = biliInfo.embedUrl;
                        iframe.setAttribute('title', videoItem.title || biliInfo.bvid);
                        iframe.setAttribute('frameborder', '0');
                        iframe.setAttribute('allowfullscreen', 'true');
                        iframe.setAttribute('referrerpolicy', 'strict-origin-when-cross-origin');
                        iframe.setAttribute('allow', 'autoplay; fullscreen; picture-in-picture');
                        playerWrap.appendChild(iframe);
                    }
                    card.classList.add('is-previewing');
                });

                card.addEventListener('mouseleave', () => {
                    card.classList.remove('is-previewing');
                    if (playerWrap) {
                        playerWrap.innerHTML = '';
                    }
                });

                card.addEventListener('click', () => {
                    window.open(biliInfo.openUrl, '_blank');
                });

                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        const changelog = [{
            date: "2026-03-14",
            title: "模板初始化",
            description: "完成首页模块划分，保留交互与动画。"
        }, {
            date: "2026-03-10",
            title: "素材替换",
            description: "替换图片、文字与视频链接。"
        }];

        function renderArticles() {
            const container = document.getElementById('articlesContainer');
            container.innerHTML = '';
            const grid = document.createElement('div');
            grid.className = 'articles-grid';

            articles.forEach(article => {
                const card = document.createElement('div');
                card.className = 'article-card';
                card.style.cursor = 'pointer';
                card.innerHTML = `
                    <div class="article-image">
                        <img src="${article.image}" alt="${article.title}">
                    </div>
                    <div class="article-content">
                        <h3>${article.title}</h3>
                        <p>${article.description}</p>
                        <div class="article-comment">${article.comment}</div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    window.open(article.link, '_blank');
                });
                grid.appendChild(card);
            });

            container.appendChild(grid);
        }

        function renderChangelog() {
            const container = document.getElementById('changelog-container');
            container.innerHTML = '';
            const timeline = document.createElement('div');
            timeline.className = 'timeline';

            changelog.forEach(log => {
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.innerHTML = `
                    <div class="timeline-marker"></div>
                    <div class="timeline-content">
                        <div class="timeline-date">${log.date}</div>
                        <div class="timeline-title">${log.title}</div>
                        <div class="timeline-description">${log.description}</div>
                    </div>
                `;
                timeline.appendChild(item);
            });

            container.appendChild(timeline);
        }

        function renderFriends() {
            const container = document.getElementById('friendsContainer');
            const friends = Array.isArray(window.FRIENDS) ? window.FRIENDS : [];

            if (!container) return;
            if (friends.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:rgba(255,255,255,0.5); padding:30px; grid-column:1/-1;">暂无友链，请在 static/data.js 中填写。</div>';
                return;
            }

            container.innerHTML = '';
            friends.forEach(friend => {
                const card = document.createElement('a');
                card.className = 'article-card';
                card.href = friend.link || '#';
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                card.style.textDecoration = 'none';
                card.style.color = 'inherit';
                card.innerHTML = `
                    <div class="article-content" style="display:flex; align-items:center; gap:16px;">
                        <img src="${friend.avatar}" alt="${friend.name}" style="width:56px; height:56px; border-radius:50%; object-fit:cover; flex:0 0 auto; border:1px solid rgba(255,255,255,0.12);" loading="lazy" referrerpolicy="no-referrer" />
                        <div style="min-width:0; flex:1;">
                            <h3 style="margin:0 0 8px 0;">${friend.name || '朋友昵称'}</h3>
                            <p style="min-height:0; margin:0;">${friend.desc || '一句话介绍'}</p>
                            <div class="article-comment" style="margin-top:12px;">${friend.link || ''}</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }
    </script>
    <script>
        async function renderHeatmap() {
            const counts = getHeatmapData();

            const container = document.getElementById('heatmapContainer');
            container.innerHTML = '';
            const today = new Date();
            const weeks = 52;
            const oneDay = 24 * 60 * 60 * 1000;

            const endDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());

            for (let w = weeks - 1; w >= 0; w--) {
                const col = document.createElement('div');
                col.className = 'heat-col';
                for (let d = 6; d >= 0; d--) {
                    const cell = document.createElement('div');
                    cell.className = 'heat-cell level-0';
                    const dayOffset = w * 7 + d;
                    const date = new Date(endDate.getTime() - dayOffset * oneDay);
                    const y = date.getFullYear();
                    const m = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    const key = `${y}-${m}-${day}`;
                    const value = counts[key] || 0;
                    let lvl = 0;
                    if (value >= 4) lvl = 4;
                    else if (value >= 3) lvl = 3;
                    else if (value >= 2) lvl = 2;
                    else if (value >= 1) lvl = 1;
                    cell.className = 'heat-cell level-' + lvl;
                    cell.title = `${key}: ${value}`;
                    col.appendChild(cell);
                }
                container.appendChild(col);
            }
        }

        function setupScrollReveal() {
            const heat = document.getElementById('heatmapContainer');
            if (heat) heat.style.opacity = 0;
            window.addEventListener('scroll', () => {
                const scrollY = window.scrollY;
                const windowH = window.innerHeight;
                let opacity = Math.min(1, Math.max(0, (scrollY - windowH / 2) / (windowH / 2)));
                if (heat) heat.style.opacity = opacity;
            });
        }

        renderFeaturedPhotos();
        renderHeatmap();
        setupScrollReveal();
        renderArticles();
        renderFocusVideos();
        renderChangelog();
        renderFriends();

        const header = document.getElementById("header");
        const hero = document.querySelector(".hero");
        if (header) header.style.opacity = 0;

        window.addEventListener("scroll", () => {
            const scrollY = window.scrollY;
            const windowH = window.innerHeight;

            if (hero) {
                let heroOpacity = Math.max(0, 1 - scrollY / windowH);
                hero.style.opacity = heroOpacity;
            }

            if (header) {
                let headerOpacity = Math.min(1, Math.max(0, (scrollY - windowH / 2) / (windowH / 2)));
                header.style.opacity = headerOpacity;
            }
        });
    </script>

    <script>
        (function() {
            const el = document.getElementById('typed');
            if (!el) return;
            const phrases = [
                "在这里写一句话介绍你自己",
                "可填写昵称、学校、兴趣",
                "也可以写一句座右铭"
            ];
            let pi = 0,
                ci = 0,
                deleting = false;
            const typeSpeed = 90,
                deleteSpeed = 50,
                pause = 1200;

            function tick() {
                const full = phrases[pi];
                if (!deleting) {
                    ci++;
                    el.textContent = full.slice(0, ci);
                    if (ci === full.length) {
                        deleting = true;
                        setTimeout(tick, pause);
                        return;
                    }
                } else {
                    ci--;
                    el.textContent = full.slice(0, ci);
                    if (ci === 0) {
                        deleting = false;
                        pi = (pi + 1) % phrases.length;
                    }
                }
                setTimeout(tick, deleting ? deleteSpeed : typeSpeed);
            }

            setTimeout(tick, 400);
        })();
    </script>

    <script src="static/particle-config.js"></script>
    <script src="starfield.js"></script>
</body>

</html>
